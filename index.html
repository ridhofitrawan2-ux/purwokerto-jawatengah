<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Access By: Ridho</title>
<style>
    body {
        margin: 0;
        background: #0b0f14;
        color: #c7d1db;
        font-family: Consolas, monospace;
    }

    .container {
        padding: 40px;
    }

    .header {
        color: #58a6ff;
        font-size: 18px;
        margin-bottom: 20px;
    }

    .terminal {
        background: #010409;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .line {
        margin: 5px 0;
    }

    .success {
        color: #3fb950;
    }

    .warning {
        color: #d29922;
    }

    .error {
        color: #f85149;
    }

    .cursor {
        display: inline-block;
        width: 10px;
        background: #c7d1db;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0%, 50%, 100% { opacity: 1; }
        25%, 75% { opacity: 0; }
    }

    .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #8b949e;
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">Secure Shell Interface v2.4.1</div>

    <div class="terminal" id="terminal">
        <div class="line">Connecting to remote host...</div>
    </div>

    <div class="footer">
        Authorized simulation environment • cybersecurity demo
    </div>
</div>

<script>
const lines = [
    "Resolving target address...",
    "Establishing secure connection...",
    "Bypassing authentication layer...",
    "Injecting payload...",
    "Escalating privileges...",
    "Access level: ROOT",
    "System integrity: compromised",
    "Deploying control interface...",
    "",
    "[✔] Access Granted"
];

let i = 0;
const terminal = document.getElementById("terminal");

function typeLine() {
    if (i < lines.length) {
        const div = document.createElement("div");
        div.classList.add("line");

        if (lines[i].includes("Access Granted")) {
            div.classList.add("success");
        }

        div.textContent = lines[i];
        terminal.appendChild(div);

        terminal.scrollTop = terminal.scrollHeight;
        i++;
        setTimeout(typeLine, 700);
    } else {
        const prompt = document.createElement("div");
        prompt.classList.add("line");
        prompt.innerHTML = "root@system:~# <span class='cursor'></span>";
        terminal.appendChild(prompt);
    }
}

setTimeout(typeLine, 1000);
</script>

</body>
</html>
